workflow:
    workflowVersion: 1.0.0
    speakeasyVersion: latest
    sources:
        api:
            inputs:
                - location: https://raw.githubusercontent.com/unkeyed/unkey/refs/heads/main/svc/api/openapi/openapi-generated.yaml
            registry:
                location: registry.speakeasyapi.dev/unkey/unkey/api
        api-python:
            inputs:
                - location: https://raw.githubusercontent.com/unkeyed/unkey/refs/heads/main/svc/api/openapi/openapi-generated.yaml
            registry:
                location: registry.speakeasyapi.dev/unkey/unkey/api-python
    targets:
        api-go:
            target: go
            source: api
            output: ./api/go
            codeSamples:
                registry:
                    location: registry.speakeasyapi.dev/unkey/unkey/api-go-code-samples
                labelOverride:
                    fixedValue: Go (SDK)
                blocking: false
        api-py:
            target: python
            source: api-python
            output: ./api/py
            publish:
                pypi:
                    token: $pypi_token
            codeSamples:
                registry:
                    location: registry.speakeasyapi.dev/unkey/unkey/api-python-code-samples
                labelOverride:
                    fixedValue: Python (SDK)
                blocking: false
        api-ts:
            target: typescript
            source: api
            output: ./api/ts
            publish:
                npm:
                    token: $npm_token
            codeSamples:
                registry:
                    location: registry.speakeasyapi.dev/unkey/unkey/api-typescript-code-samples
                labelOverride:
                    fixedValue: Typescript (SDK)
                blocking: false
